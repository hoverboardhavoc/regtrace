name: regtrace regression

on:
  pull_request:
    paths:
      - 'vectors/**'
      - 'targets/**'
      - 'build_assets/**'
      - 'src/regtrace/**'
      - 'pyproject.toml'
      - 'bootstrap.toml'
      - '.github/workflows/regtrace.yml'
  push:
    branches:
      - main

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out regtrace
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi
          arm-none-eabi-gcc --version

      - name: Install regtrace + Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Bootstrap sibling repos at pinned commits
        run: |
          export REGTRACE_WORKSPACE="${{ github.workspace }}/_workspace"
          mkdir -p "$REGTRACE_WORKSPACE"
          regtrace selftest --bootstrap

      - name: Run pytest unit tests
        run: |
          pytest tests/

      - name: Run regression vs golden/libopencm3/v0.8.0
        run: |
          export REGTRACE_WORKSPACE="${{ github.workspace }}/_workspace"
          if [ -d golden/libopencm3/v0.8.0 ]; then
            regtrace regression --baseline=golden/libopencm3/v0.8.0/
          else
            echo "No v0.8.0 baseline checked in (LFS not fetched?). Skipping."
          fi

      - name: Run regression vs golden/libopencm3/master
        run: |
          export REGTRACE_WORKSPACE="${{ github.workspace }}/_workspace"
          if [ -d golden/libopencm3/master ]; then
            regtrace regression --baseline=golden/libopencm3/master/
          else
            echo "No master baseline checked in (LFS not fetched?). Skipping."
          fi
