name: dma_transmit_enable
description: |
  Enable DMA-driven USART transmit (sets the DMAT bit in CR3 / CTL2).
  Mined from hoverboard comms patterns where USART TX feeds from DMA.

mode: final_state

default_compare: [gd-spl/gd32f1x0, libopencm3/gd32f1x0]

implementations:
  gd-spl/gd32f1x0:
    includes: [gd32f1x0.h, gd32f1x0_usart.h]
    body: |
      usart_dma_transmit_config(USART0, USART_DENT_ENABLE);

  libopencm3/stm32f0:
    includes: [libopencm3/stm32/usart.h]
    body: |
      usart_enable_tx_dma(USART1);

  libopencm3/gd32f1x0:
    includes: [libopencm3/stm32/usart.h]
    body: |
      // gd32/f1x0/usart.h forwards to stm32/common/usart_common_v2.h.
      // GD USART0 ↔ libopencm3 USART1 (both APB2[14]).
      usart_enable_tx_dma(USART1);
