# targets/stm32f0.toml — STM32F0 family (Cortex-M0).
#
# Peripheral memory layout sourced from RM0091 (STM32F0x1/F0x2/F0x8 reference
# manual). Reset values are per-register defaults from the same RM.
#
# Hex literals use TOML's underscore-allowed integer syntax where natural; for
# offsets/values within nested tables we use quoted-hex strings ("0x00") because
# TOML does not allow hex keys.

arch         = "cortex-m0"
unicorn_arch = "arm"
unicorn_mode = "thumb"

# SoC peripheral block + Cortex-M0 private peripheral block (NVIC/SCB/SysTick).
[[peripheral_ranges]]
start = 0x40000000
end   = 0x5FFFFFFF

[[peripheral_ranges]]
start = 0xE0000000
end   = 0xE00FFFFF

[peripheral_bases]
TIM2_BASE   = 0x40000000
TIM3_BASE   = 0x40000400
TIM6_BASE   = 0x40001000
TIM7_BASE   = 0x40001400
TIM14_BASE  = 0x40002000
RTC_BASE    = 0x40002800
WWDG_BASE   = 0x40002C00
IWDG_BASE   = 0x40003000
SPI2_BASE   = 0x40003800
USART2_BASE = 0x40004400
USART3_BASE = 0x40004800
USART4_BASE = 0x40004C00
USART5_BASE = 0x40005000
I2C1_BASE   = 0x40005400
I2C2_BASE   = 0x40005800
PWR_BASE    = 0x40007000
SYSCFG_BASE = 0x40010000
EXTI_BASE   = 0x40010400
USART6_BASE = 0x40011400
USART7_BASE = 0x40011800
USART8_BASE = 0x40011C00
ADC1_BASE   = 0x40012400
TIM1_BASE   = 0x40012C00
SPI1_BASE   = 0x40013000
USART1_BASE = 0x40013800
TIM15_BASE  = 0x40014000
TIM16_BASE  = 0x40014400
TIM17_BASE  = 0x40014800
DBGMCU_BASE = 0x40015800
DMA_BASE    = 0x40020000
RCC_BASE    = 0x40021000
FLASH_BASE  = 0x40022000
CRC_BASE    = 0x40023000
GPIOA_BASE  = 0x48000000
GPIOB_BASE  = 0x48000400
GPIOC_BASE  = 0x48000800
GPIOD_BASE  = 0x48000C00
GPIOE_BASE  = 0x48001000
GPIOF_BASE  = 0x48001400
NVIC_BASE   = 0xE000E100
SCB_BASE    = 0xE000ED00
SYSTICK_BASE = 0xE000E010

[register_names.TIM1_BASE]
"0x00" = "CR1"
"0x04" = "CR2"
"0x08" = "SMCR"
"0x0C" = "DIER"
"0x10" = "SR"
"0x14" = "EGR"
"0x18" = "CCMR1"
"0x1C" = "CCMR2"
"0x20" = "CCER"
"0x24" = "CNT"
"0x28" = "PSC"
"0x2C" = "ARR"
"0x30" = "RCR"
"0x34" = "CCR1"
"0x38" = "CCR2"
"0x3C" = "CCR3"
"0x40" = "CCR4"
"0x44" = "BDTR"
"0x48" = "DCR"
"0x4C" = "DMAR"

[register_names.IWDG_BASE]
"0x00" = "KR"
"0x04" = "PR"
"0x08" = "RLR"
"0x0C" = "SR"
"0x10" = "WINR"
"0x14" = "EWCR"

[register_names.RCC_BASE]
"0x00" = "CR"
"0x04" = "CFGR"
"0x08" = "CIR"
"0x0C" = "APB2RSTR"
"0x10" = "APB1RSTR"
"0x14" = "AHBENR"
"0x18" = "APB2ENR"
"0x1C" = "APB1ENR"
"0x20" = "BDCR"
"0x24" = "CSR"
"0x28" = "AHBRSTR"
"0x2C" = "CFGR2"
"0x30" = "CFGR3"
"0x34" = "CR2"

# Reset values from RM0091. Only the registers a typical init function reads
# before writing need to be listed; the rest default to 0 in Unicorn-mapped
# memory (which matches the real silicon for most peripheral registers).

[reset_values.RCC_BASE]
"0x00" = "0x00000083"   # CR    — HSION = 1
"0x14" = "0x00000014"   # AHBENR — SRAM, Flash interface clocks on at reset
"0x24" = "0x0C000000"   # CSR   — power-on reset flags

# STM32F0 (Cortex-M0) has no bit-banding.
[bit_band_aliases]
