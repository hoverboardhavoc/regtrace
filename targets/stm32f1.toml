# targets/stm32f1.toml — STM32F1 family (Cortex-M3).
# Layout from RM0008. Bit-banding aliases at 0x42000000.

arch         = "cortex-m3"
unicorn_arch = "arm"
unicorn_mode = "thumb"

[[peripheral_ranges]]
start = 0x40000000
end   = 0x5FFFFFFF

[[peripheral_ranges]]
start = 0xE0000000
end   = 0xE00FFFFF

[peripheral_bases]
TIM2_BASE   = 0x40000000
TIM3_BASE   = 0x40000400
TIM4_BASE   = 0x40000800
TIM5_BASE   = 0x40000C00
TIM6_BASE   = 0x40001000
TIM7_BASE   = 0x40001400
RTC_BASE    = 0x40002800
WWDG_BASE   = 0x40002C00
IWDG_BASE   = 0x40003000
SPI2_BASE   = 0x40003800
SPI3_BASE   = 0x40003C00
USART2_BASE = 0x40004400
USART3_BASE = 0x40004800
USART4_BASE = 0x40004C00
USART5_BASE = 0x40005000
I2C1_BASE   = 0x40005400
I2C2_BASE   = 0x40005800
PWR_BASE    = 0x40007000
AFIO_BASE   = 0x40010000
EXTI_BASE   = 0x40010400
ADC1_BASE   = 0x40012400
ADC2_BASE   = 0x40012800
TIM1_BASE   = 0x40012C00
SPI1_BASE   = 0x40013000
TIM8_BASE   = 0x40013400
USART1_BASE = 0x40013800
ADC3_BASE   = 0x40013C00
DMA_BASE    = 0x40020000
DMA2_BASE   = 0x40020400
RCC_BASE    = 0x40021000
FLASH_BASE  = 0x40022000
CRC_BASE    = 0x40023000
GPIOA_BASE  = 0x40010800
GPIOB_BASE  = 0x40010C00
GPIOC_BASE  = 0x40011000
GPIOD_BASE  = 0x40011400
GPIOE_BASE  = 0x40011800
GPIOF_BASE  = 0x40011C00
GPIOG_BASE  = 0x40012000
NVIC_BASE   = 0xE000E100
SCB_BASE    = 0xE000ED00
SYSTICK_BASE = 0xE000E010

[register_names.TIM1_BASE]
"0x00" = "CR1"
"0x04" = "CR2"
"0x08" = "SMCR"
"0x0C" = "DIER"
"0x10" = "SR"
"0x14" = "EGR"
"0x18" = "CCMR1"
"0x1C" = "CCMR2"
"0x20" = "CCER"
"0x24" = "CNT"
"0x28" = "PSC"
"0x2C" = "ARR"
"0x30" = "RCR"
"0x34" = "CCR1"
"0x38" = "CCR2"
"0x3C" = "CCR3"
"0x40" = "CCR4"
"0x44" = "BDTR"

[register_names.IWDG_BASE]
"0x00" = "KR"
"0x04" = "PR"
"0x08" = "RLR"
"0x0C" = "SR"

[register_names.RCC_BASE]
"0x00" = "CR"
"0x04" = "CFGR"
"0x08" = "CIR"
"0x0C" = "APB2RSTR"
"0x10" = "APB1RSTR"
"0x14" = "AHBENR"
"0x18" = "APB2ENR"
"0x1C" = "APB1ENR"

[reset_values.RCC_BASE]
"0x00" = "0x00000083"

[bit_band_aliases]
0x42000000 = 0x40000000
