# targets/gd32f1x0.toml — GD32F1x0 family (Cortex-M3 — F130/F150/F170/F190).
#
# Peripheral memory layout sourced from GD32F1x0 User Manual Rev 3.6.
# Symbol names are STM32-style (TIM1_BASE, RCC_BASE, etc.) so that gd-spl
# traces compare against libopencm3/stm32f0 traces. The vendor SPL calls
# them TIMER0/RCU/etc. — that vocabulary is irrelevant to the trace
# (addresses are what matter).
#
# Note: GD32F1x0 RCU sits at 0x40021000 (same as STM32 RCC). For trace
# comparison purposes we use RCC_BASE.

arch         = "cortex-m3"
unicorn_arch = "arm"
unicorn_mode = "thumb"

[[peripheral_ranges]]
start = 0x40000000
end   = 0x5FFFFFFF

[[peripheral_ranges]]
start = 0xE0000000
end   = 0xE00FFFFF

[peripheral_bases]
TIM2_BASE   = 0x40000000
TIM3_BASE   = 0x40000400
TIM6_BASE   = 0x40001000
TIM14_BASE  = 0x40002000
RTC_BASE    = 0x40002800
WWDG_BASE   = 0x40002C00
IWDG_BASE   = 0x40003000
# Bus-peripheral symbol names follow the libopencm3 / STM32 convention so
# traces compare cleanly across families. GD's vendor naming differs (GD
# starts numbering at 0; STM32 starts at 1).
SPI2_BASE   = 0x40003800   # GD: SPI1
USART2_BASE = 0x40004400   # GD: USART1
USART3_BASE = 0x40004800
USART4_BASE = 0x40004C00
I2C1_BASE   = 0x40005400   # GD: I2C0
I2C2_BASE   = 0x40005800   # GD: I2C1
PWR_BASE    = 0x40007000
SYSCFG_BASE = 0x40010000
EXTI_BASE   = 0x40010400
ADC1_BASE   = 0x40012400   # GD: ADC0
TIM1_BASE   = 0x40012C00   # GD: TIMER0
SPI1_BASE   = 0x40013000   # GD: SPI0
USART1_BASE = 0x40013800   # GD: USART0
TIM15_BASE  = 0x40014000
TIM16_BASE  = 0x40014400
TIM17_BASE  = 0x40014800
DBGMCU_BASE = 0x40015800
DMA_BASE    = 0x40020000
RCC_BASE    = 0x40021000   # GD calls this RCU
# GD vendor name FMC; libopencm3/STM32 name FLASH. Same peripheral, same
# registers (offsets 0x00..0x20 are bit-compatible with STM32F1 FLASH).
# Use FLASH_BASE as the canonical symbol so traces from gd-spl/gd32f1x0
# compare cleanly against libopencm3/stm32f1 in the comparator (which keys
# on symbolic addresses). Declaring both FMC_BASE and FLASH_BASE at the
# same numeric address is intentionally avoided — the symbolise() reverse-
# lookup picks the longest-matching base, and a tie at the same base would
# be resolved by Python dict iteration order which is fragile.
FLASH_BASE  = 0x40022000   # GD calls this FMC; same registers as STM32 FLASH
CRC_BASE    = 0x40023000
GPIOA_BASE  = 0x48000000
GPIOB_BASE  = 0x48000400
GPIOC_BASE  = 0x48000800
GPIOD_BASE  = 0x48000C00
GPIOF_BASE  = 0x48001400
NVIC_BASE   = 0xE000E100
SCB_BASE    = 0xE000ED00
SYSTICK_BASE = 0xE000E010

[register_names.TIM1_BASE]
"0x00" = "CR1"
"0x04" = "CR2"
"0x08" = "SMCR"
"0x0C" = "DIER"
"0x10" = "SR"
"0x14" = "EGR"
"0x18" = "CCMR1"
"0x1C" = "CCMR2"
"0x20" = "CCER"
"0x24" = "CNT"
"0x28" = "PSC"
"0x2C" = "ARR"
"0x30" = "RCR"
"0x34" = "CCR1"
"0x38" = "CCR2"
"0x3C" = "CCR3"
"0x40" = "CCR4"
"0x44" = "BDTR"
"0x48" = "DCR"
"0x4C" = "DMAR"

[register_names.IWDG_BASE]
"0x00" = "KR"
"0x04" = "PR"
"0x08" = "RLR"
"0x0C" = "SR"
"0x10" = "WINR"

[register_names.RCC_BASE]
"0x00" = "CR"
"0x04" = "CFGR"
"0x08" = "CIR"
"0x0C" = "APB2RSTR"
"0x10" = "APB1RSTR"
"0x14" = "AHBENR"
"0x18" = "APB2ENR"
"0x1C" = "APB1ENR"
"0x20" = "BDCR"           # GD: RCU_BDCTL
"0x24" = "CSR"            # GD: RCU_RSTSCK
"0x28" = "AHBRSTR"        # GD: RCU_AHBRST
"0x2C" = "CFGR2"          # GD: RCU_CFG1 — HXTALPREDV
"0x30" = "CFGR3"          # GD: RCU_CFG2 — USART0SEL/CECSEL/ADCSEL
"0x34" = "CR2"            # GD: RCU_CTL1 — IRC14M control

# FLASH (GD calls this FMC). Offsets 0x00..0x20 align with STM32F1 FLASH;
# 0x100 (WSEN) is GD-specific. Note GD's FMC_WS at 0x00 has a wait-state
# field in bits [2:0], same position as STM32F1 FLASH_ACR LATENCY[2:0] —
# bit-compatible, just renamed.
[register_names.FLASH_BASE]
"0x00" = "ACR"          # GD: FMC_WS — bits [2:0] = WSCNT (= LATENCY)
"0x04" = "KEYR"         # GD: FMC_KEY
"0x08" = "OPTKEYR"      # GD: FMC_OBKEY
"0x0C" = "SR"           # GD: FMC_STAT
"0x10" = "CR"           # GD: FMC_CTL
"0x14" = "AR"           # GD: FMC_ADDR
"0x1C" = "OBR"          # GD: FMC_OBSTAT
"0x20" = "WRPR"         # GD: FMC_WP
"0x100" = "WSEN"        # GD-only — has no STM32F1 equivalent

[reset_values.RCC_BASE]
"0x00" = "0x00000083"
"0x14" = "0x00000014"

# FLASH_BASE (FMC). Reset values per GD32F1x0 User Manual Rev 3.6 §3.4.
# FMC_CTL.LK bit (bit 7) is set out of reset → fmc_unlock will see locked.
# FMC_STAT busy/error bits are all zero out of reset.
[reset_values.FLASH_BASE]
"0x00" = "0x00000030"   # FMC_WS — PFTEN(bit4) and ICEN(bit5) set, WSCNT=0
"0x0C" = "0x00000000"   # FMC_STAT — no busy, no errors, no end-of-op
"0x10" = "0x00000080"   # FMC_CTL — LK=1, all op bits clear

# GD32F1x0 is Cortex-M3 — bit-banding aliases exist.
# Alias regions: 0x22000000-0x23FFFFFF (peripheral 0x40000000-0x400FFFFF)
[bit_band_aliases]
0x42000000 = 0x40000000
