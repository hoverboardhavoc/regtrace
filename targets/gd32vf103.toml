# targets/gd32vf103.toml — GD32VF103 (RISC-V, RV32IMAC + Bumblebee N200 core).
#
# Same silicon as GD32F103 except the core is replaced with a Nuclei N200
# RISC-V (Bumblebee). Peripheral memory layout is identical to the ARM
# variant, so symbol names mirror libopencm3/STM32F1's vocabulary for
# cross-architecture trace comparison.
#
# This is the v0.6+ proof-of-concept that regtrace's per-architecture seam
# (unicorn_arch + per-arch hooks) is dozens of lines, not a new pattern set.

arch         = "riscv32-imac"
unicorn_arch = "riscv"
unicorn_mode = "riscv32"

[[peripheral_ranges]]
start = 0x40000000
end   = 0x5FFFFFFF

# RISC-V GD32VF103 has the Nuclei ECLIC/SysTimer at 0xD2000000-0xD200FFFF.
# Captured here so timer/IRQ writes don't fall outside peripheral filter.
[[peripheral_ranges]]
start = 0xD2000000
end   = 0xD200FFFF

[peripheral_bases]
TIM2_BASE   = 0x40000000
TIM3_BASE   = 0x40000400
TIM4_BASE   = 0x40000800
TIM5_BASE   = 0x40000C00
TIM6_BASE   = 0x40001000
TIM7_BASE   = 0x40001400
RTC_BASE    = 0x40002800
WWDG_BASE   = 0x40002C00
IWDG_BASE   = 0x40003000
SPI2_BASE   = 0x40003800
SPI3_BASE   = 0x40003C00
USART2_BASE = 0x40004400
USART3_BASE = 0x40004800
USART4_BASE = 0x40004C00
USART5_BASE = 0x40005000
I2C1_BASE   = 0x40005400
I2C2_BASE   = 0x40005800
PWR_BASE    = 0x40007000
AFIO_BASE   = 0x40010000
EXTI_BASE   = 0x40010400
ADC1_BASE   = 0x40012400
ADC2_BASE   = 0x40012800
TIM1_BASE   = 0x40012C00
SPI1_BASE   = 0x40013000
USART1_BASE = 0x40013800
DMA_BASE    = 0x40020000
RCC_BASE    = 0x40021000
FLASH_BASE  = 0x40022000
CRC_BASE    = 0x40023000
GPIOA_BASE  = 0x40010800
GPIOB_BASE  = 0x40010C00
GPIOC_BASE  = 0x40011000
GPIOD_BASE  = 0x40011400
GPIOE_BASE  = 0x40011800
ECLIC_BASE  = 0xD2000000

[register_names.TIM1_BASE]
"0x00" = "CR1"
"0x04" = "CR2"
"0x08" = "SMCR"
"0x0C" = "DIER"
"0x10" = "SR"
"0x14" = "EGR"
"0x18" = "CCMR1"
"0x1C" = "CCMR2"
"0x20" = "CCER"
"0x24" = "CNT"
"0x28" = "PSC"
"0x2C" = "ARR"
"0x30" = "RCR"
"0x34" = "CCR1"
"0x38" = "CCR2"
"0x3C" = "CCR3"
"0x40" = "CCR4"
"0x44" = "BDTR"

[register_names.IWDG_BASE]
"0x00" = "KR"
"0x04" = "PR"
"0x08" = "RLR"
"0x0C" = "SR"

[register_names.RCC_BASE]
"0x00" = "CR"
"0x04" = "CFGR"

# RISC-V has no bit-banding aliases.
[bit_band_aliases]
